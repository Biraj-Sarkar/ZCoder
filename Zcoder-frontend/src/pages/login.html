<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../styles/login-styles.css">
    <title>ZCoder</title>
</head>
<body>
    <div class="imgcontainer">
        <img src="../../public/zcoder-logo.png" alt="ZCoder Logo" class="logo">
    </div>
    <div class="login-container">
    <div class="login-header">
        <h1>Welcome Back</h1>
        <p>Sign in to your account</p>
    </div>
    
    <div class="login-form">
        <div class="form-tabs">
            <button class="tab-button active" data-tab="username">Username</button>
            <button class="tab-button" data-tab="email">Email</button>
        </div>

        <div id="username-tab" class="tab-content active">
            <form id="username-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required>
                </div>
                <div class="form-group">
                    <label for="password-username">Password</label>
                    <input type="password" id="password-username" name="password" required>
                </div>
                <button type="submit" class="login-button">Sign In</button>
            </form>
        </div>

        <div id="email-tab" class="tab-content">
            <form id="email-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="password-email">Password</label>
                    <input type="password" id="password-email" name="password" required>
                </div>
                <button type="submit" class="login-button">Sign In</button>
            </form>
        </div>
            
        <div class="forgot-password">
            <a href="#" id="forgot-password-link">Forgot your password?</a>
        </div>
            
        <div class="divider">
            <span>or continue with</span>
        </div>
            
        <div class="social-login">
            <button class="social-button facebook" id="facebook-login">
                <svg class="social-icon" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
                </svg>
                Continue with Facebook
            </button>
            
            <button class="social-button google" id="google-login">
                <svg class="social-icon" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                Continue with Google
            </button>
        </div>
            
        <div class="signup-link">
            Don't have an account? <a href="signup.html" id="signup-link">Sign up</a>
        </div>
    </div>
    </div>
    <script>
        const tabButtons = document.querySelectorAll('.tab-button');
        const tabContents = document.querySelectorAll('.tab-content');

        tabButtons.forEach(button => {
            button.addEventListener('click', () => {
                const tabName = button.getAttribute('data-tab');
                
                // Remove active class from all tabs and contents
                tabButtons.forEach(btn => btn.classList.remove('active'));
                tabContents.forEach(content => content.classList.remove('active'));
                
                // Add active class to clicked tab and corresponding content
                button.classList.add('active');
                document.getElementById(tabName + '-tab').classList.add('active');
            });
        });

        document.getElementById('username-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password-username').value;
            
            console.log('Username login attempt:', { username, password });
            if (username && password) {
                alert(`Welcome ${username}! Redirecting to dashboard...`);
                // Redirect to home page with username
                window.location.href = `home.html?username=${encodeURIComponent(username)}`;
            } else {
                alert('Please enter both username and password');
            }
        });

        document.getElementById('email-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password-email').value;
            
            console.log('Email login attempt:', { email, password });
            if (email && password) {
                // Extract username from email (before @)
                const username = email.split('@')[0];
                alert(`Welcome ${username}! Redirecting to dashboard...`);
                // Redirect to home page with username
                window.location.href = `home.html?username=${encodeURIComponent(username)}`;
            } else {
                alert('Please enter both email and password');
            }
        });

        // Social login handler
        document.getElementById('facebook-login').addEventListener('click', function() {
            console.log('Facebook login clicked');
            alert('Facebook login would be initiated here');
        });

        document.getElementById('google-login').addEventListener('click', function() {
            console.log('Google login clicked');
            alert('Google login would be initiated here');
        });

        document.getElementById('forgot-password-link').addEventListener('click', function(e) {
            e.preventDefault();
            const email = prompt('Please enter your email address to reset your password:');
            if (email) {
                console.log('Password reset requested for:', email);
                alert(`Password reset link would be sent to: ${email}`);
            }
        });

        // Updated signup link handler
        document.getElementById('signup-link').addEventListener('click', function(e) {
            // Remove preventDefault to allow normal navigation
            console.log('Navigating to signup page');
        });

        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', function() {
                this.parentElement.classList.add('focused');
            });
            
            input.addEventListener('blur', function() {
                this.parentElement.classList.remove('focused');
            });
        });
    </script>
</body>
</html>
